version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: golden-horse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: golden_horse_production
      POSTGRES_USER: golden_horse_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "5432:5432"
    networks:
      - golden-horse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U golden_horse_user -d golden_horse_production"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: golden-horse-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - golden-horse-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Golden Horse Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: golden-horse-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      
      # Database Configuration
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: golden_horse_production
      DB_USER: golden_horse_user
      DB_PASSWORD: ${DB_PASSWORD}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 24h
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      
      # CORS Configuration
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # Security
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      
      # Backup Configuration
      BACKUP_ENABLED: true
      BACKUP_PATH: /app/backups
      BACKUP_RETENTION_DAYS: 30
      
      # Company Configuration
      COMPANY_NAME: شركة الحصان الذهبي للشحن
      COMPANY_NAME_EN: Golden Horse Shipping
      DEFAULT_CURRENCY: LYD
      
    volumes:
      - app_uploads:/app/server/uploads
      - app_logs:/app/server/logs
      - app_backups:/app/backups
    ports:
      - "5001:5001"
    networks:
      - golden-horse-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: golden-horse-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - golden-horse-network
    depends_on:
      - app
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backup Service (Optional)
  backup:
    image: postgres:15-alpine
    container_name: golden-horse-backup
    restart: "no"
    environment:
      PGPASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    networks:
      - golden-horse-network
    depends_on:
      - postgres
    command: /bin/sh -c "chmod +x /backup.sh && /backup.sh"
    profiles:
      - backup

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  app_uploads:
    driver: local
  app_logs:
    driver: local
  app_backups:
    driver: local
  nginx_logs:
    driver: local

networks:
  golden-horse-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
